OwnerCalendar:
  type: object
  properties:
    id:
      type: integer
      example: 1
    title:
      type: string
      example: "Réunion annuelle des propriétaires"
    startDate:
      type: string
      format: date
      example: "2025-05-10"
    endDate:
      type: string
      format: date
      example: "2025-05-12"
  required:
    - title
    - startDate
    - endDate
